services:
  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=mysql://root:docflow_pwd@db:3306/docflow
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=${JWT_SECRET:-please-set-a-strong-random-secret-here-min-32}
      - JWT_EXPIRES_IN=${JWT_EXPIRES_IN:-15m}
      - JWT_REFRESH_EXPIRES_IN=${JWT_REFRESH_EXPIRES_IN:-7d}
      - AUTH_DEMO_PASSWORD=${AUTH_DEMO_PASSWORD:-Docflow@123}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-}
      - APP_ENV=production
      - STORAGE_ENDPOINT=http://minio:9000
      - STORAGE_REGION=${STORAGE_REGION:-us-east-1}
      - STORAGE_ACCESS_KEY=${MINIO_ROOT_USER:-minioadmin}
      - STORAGE_SECRET_KEY=${MINIO_ROOT_PASSWORD:-minioadmin}
      - STORAGE_BUCKET=${STORAGE_BUCKET:-docflow-files}
      - STORAGE_PUBLIC_URL=${STORAGE_PUBLIC_URL:-http://localhost:9100}
      - FORMAT_CONVERTER_ENDPOINT=${FORMAT_CONVERTER_ENDPOINT:-}
      - FORMAT_CONVERTER_TOKEN=${FORMAT_CONVERTER_TOKEN:-}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: mysql:8.0
    environment:
      - MYSQL_ROOT_PASSWORD=docflow_pwd
      - MYSQL_DATABASE=docflow
      - MYSQL_CHARSET=utf8mb4
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docs/doc.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - ./docs/rbac.sql:/docker-entrypoint-initdb.d/02-rbac.sql
      - ./docs/doc_seed.sql:/docker-entrypoint-initdb.d/03-seed.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  hocuspocus:
    build: ./hocuspocus
    ports:
      - "1234:1234"
    environment:
      - JWT_SECRET=${JWT_SECRET:-please-set-a-strong-random-secret-here-min-32}
      - HOCUSPOCUS_PORT=1234
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    ports:
      - "9100:9000"    # S3 API（主机 9100 → 容器 9000；避开 phpStudy 的 9000 占用）
      - "9101:9001"    # Web 控制台（主机 9101 → 容器 9001）
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  mysql_data:
  redis_data:
  minio_data:
